<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Isfand Yar Bukhari District Hospital — Laboratory System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F7F6; --surface:#fff; --ink:#16302E; --header:#12313B;
    --accent:#0E7C86; --accent-soft:#EAF4F2; --border:#DDE5E3;
    --muted:#5B6B6E; --muted2:#8FA3A1; --bad:#C1440E; --bad-soft:#FDF1E7;
    --bad-fg:#B4590E; --good:#2F7D5D; --good-soft:#E4F1EB; --barfill:#BFE3D9;
  }
  *{box-sizing:border-box;}
  body{margin:0; font-family:'Inter',sans-serif; background:var(--bg); color:var(--ink);}
  .display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}

  header{background:var(--header); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;}
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-icon{width:38px; height:38px; border-radius:10px; background:var(--accent); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:15px;}
  .brand-name{font-weight:700; font-size:16px; color:#fff;}
  .brand-sub{font-size:11px; color:#9FC3C4; letter-spacing:.3px;}
  .tabs{display:flex; gap:8px; flex-wrap:wrap;}
  .tab-btn{display:flex; align-items:center; gap:6px; padding:9px 14px; border-radius:8px; border:none; cursor:pointer; background:rgba(255,255,255,.08); color:#C9DAD9; font-weight:600; font-size:12.5px; font-family:'Inter',sans-serif;}
  .tab-btn.active{background:var(--accent); color:#fff;}

  main{padding:18px; max-width:1150px; margin:0 auto;}
  .card{background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px;}
  .grid-2{display:grid; grid-template-columns:300px 1fr; gap:16px; align-items:start;}
  @media (max-width:760px){ .grid-2{grid-template-columns:1fr;} header{padding:14px;} main{padding:12px;} }

  .field{margin-bottom:12px;}
  .field label{display:block; font-size:11.5px; font-weight:600; color:var(--muted); margin-bottom:5px;}
  .field input, .field select{width:100%; padding:9px 10px; border-radius:7px; border:1px solid var(--border); font-size:14px; background:#FAFCFB; color:var(--ink); font-family:'Inter',sans-serif;}
  .row-2{display:grid; grid-template-columns:1fr 1fr; gap:10px;}

  .btn{display:inline-flex; align-items:center; gap:6px; padding:10px 16px; border-radius:8px; border:none; font-weight:600; font-size:13.5px; cursor:pointer; font-family:'Inter',sans-serif;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:disabled{background:#CBD8D6; cursor:not-allowed;}
  .btn-outline{background:#fff; border:1px solid var(--border); color:var(--header);}
  .btn-outline.on{background:var(--accent-soft); color:var(--accent);}
  .hint{font-size:11.5px; color:var(--muted2); margin-top:8px;}

  .panel-title{font-weight:600; font-size:14px; margin-bottom:4px;}
  .panel-sub{font-size:12px; color:var(--muted2); margin-bottom:12px;}

  .cat-list{display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:10px;}
  .cat-item{display:flex; align-items:flex-start; gap:8px; padding:10px 12px; border-radius:8px; border:1px solid #E4EBE9; background:#FAFCFB; cursor:pointer;}
  .cat-item.checked{border-color:var(--accent); background:var(--accent-soft);}
  .cat-item input{margin-top:2px; accent-color:var(--accent);}
  .cat-item .name{font-weight:600; font-size:13px;}
  .cat-item .count{font-size:11px; color:var(--muted2); margin-top:2px;}

  .search-wrap{position:relative; margin-bottom:0;}
  .search-wrap input{padding-left:30px;}
  .search-icon{position:absolute; left:9px; top:10px; color:var(--muted2); font-size:14px;}

  .order-list{max-height:560px; overflow-y:auto; border-top:1px solid var(--border);}
  .order-item{display:block; width:100%; text-align:left; padding:12px 14px; border:none; border-bottom:1px solid #EEF2F1; background:#fff; cursor:pointer;}
  .order-item.sel{background:var(--accent-soft);}
  .order-item .top{display:flex; justify-content:space-between; align-items:center;}
  .order-item .oname{font-weight:600; font-size:13.5px;}
  .order-item .omr{font-size:11px; color:var(--muted); margin-top:2px;}
  .empty-note{padding:20px; font-size:13px; color:var(--muted2); text-align:center;}

  .badge{display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:600;}
  .badge.pending{background:var(--bad-soft); color:var(--bad-fg);}
  .badge.completed{background:var(--good-soft); color:var(--good);}

  .warn-box{display:flex; align-items:center; gap:6px; margin-top:10px; padding:7px 10px; background:var(--bad-soft); border-radius:7px; color:var(--bad-fg); font-size:12px; font-weight:600;}

  .sec-title{font-weight:700; font-size:12px; color:var(--header); margin:18px 0 10px; text-transform:uppercase; letter-spacing:.3px;}
  .cat-heading{font-weight:700; font-size:14.5px; color:var(--accent); margin:22px 0 6px; padding-bottom:6px; border-bottom:2px solid var(--accent-soft);}
  .cat-heading:first-child{margin-top:14px;}
  .param-row{display:grid; grid-template-columns:1fr 130px 180px; gap:12px; align-items:center; padding-bottom:10px; border-bottom:1px solid #EEF2F1; margin-bottom:10px;}
  @media (max-width:600px){ .param-row{grid-template-columns:1fr; gap:6px;} }
  .param-name{font-weight:600; font-size:13px;}
  .param-ref{font-family:'IBM Plex Mono',monospace; font-size:10.5px; color:var(--muted2); white-space:pre-line;}
  .param-input-wrap{display:flex; align-items:center; gap:6px;}
  .param-input-wrap input, .param-input-wrap select{padding:7px 8px; border-radius:7px; border:1px solid var(--border); font-size:13px; font-family:'IBM Plex Mono',monospace; width:90px;}
  .param-input-wrap select{font-family:'Inter',sans-serif; width:130px; font-size:12.5px;}
  .flag-tag{font-size:10px; font-weight:700; color:var(--bad);}
  .rangebar{width:100%;}
  .rangebar .track{position:relative; height:6px; border-radius:3px; background:#E4EBE9;}
  .rangebar .fill{position:absolute; top:0; bottom:0; background:var(--barfill); border-radius:3px;}
  .rangebar .marker{position:absolute; top:-3px; width:12px; height:12px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.12);}
  .rangebar .labels{display:flex; justify-content:space-between; margin-top:3px; font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted);}
  .unit-note{font-size:11.5px; color:var(--muted2);}

  table.hist{width:100%; border-collapse:collapse; font-size:13px;}
  table.hist th{padding:8px 10px; font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; text-align:left; border-bottom:2px solid var(--border);}
  table.hist td{padding:9px 10px; border-bottom:1px solid #EEF2F1;}
  .table-wrap{overflow-x:auto;}

  .dashed{border:1px dashed var(--border); border-radius:12px; padding:40px; text-align:center; color:var(--muted2); font-size:13.5px;}

  .storage-banner{padding:10px 18px; font-size:13px; font-weight:600; text-align:center;}
  .storage-banner.warn{background:var(--bad-soft); color:var(--bad-fg);}
  .storage-banner.err{background:#C1440E; color:#fff;}

  /* Print */
  .print-only{display:none;}
  @media print{
    .no-print{display:none !important;}
    .print-only{display:block !important;}
    body{background:#fff;}
  }
  .rpt-header{display:flex; align-items:center; gap:16px; border-bottom:2px solid #12313B; padding-bottom:10px; margin-bottom:16px;}
  .rpt-logo{width:60px; height:60px; border-radius:50%; border:2px solid #12313B; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px;}
  .rpt-title-block{text-align:center; flex:1;}
  .rpt-urdu{font-size:17px; font-weight:700; direction:rtl;}
  .rpt-en{font-size:14px; font-weight:700; text-decoration:underline;}
  .rpt-addr{font-size:12px; color:#333;}
  .rpt-hdr{border-top:1px solid #333; border-left:1px solid #333; margin-bottom:18px; font-size:13px;}
  .rpt-hdr-row{display:grid;}
  .rpt-hdr-row > div{border-right:1px solid #333; border-bottom:1px solid #333; padding:6px 9px; display:flex; align-items:center;}
  .rpt-hdr .lbl{font-weight:700;}
  .rpt-hdr .shade{background:#e2e2e2; font-weight:600;}
  .rpt-hdr-row.r1{grid-template-columns:12% 46% 12% 30%;}
  .rpt-hdr-row.r2{grid-template-columns:12% 38% 10% 15% 10% 15%;}
  .rpt-hdr-row.r3{grid-template-columns:12% 46% 21% 21%;}
  table.rpt-results{width:100%; border-collapse:collapse; font-size:13px;}
  table.rpt-results th{text-align:center; padding:6px 8px; border-top:2px solid #111; border-bottom:1px solid #111;}
  table.rpt-results th:first-child{text-align:left;}
  table.rpt-results td{padding:3px 6px;}
  .rpt-cat-title{font-weight:700; font-size:13.5px; padding-top:14px !important;}
  .rpt-sec-title{font-weight:700; font-style:italic; padding-top:6px !important; padding-left:10px !important;}
  .rpt-sig{margin-top:40px; display:flex; justify-content:flex-end;}
  .rpt-sig div{border-top:1px solid #111; padding-top:4px; width:180px; font-size:12px; text-align:center;}
  .rpt-comments{margin-top:14px; padding-top:10px; border-top:1px dashed #333; font-size:11.5px; color:#222;}
  .rpt-pagebreak{page-break-after:always;}
</style>
</head>

function catById(id){ return TEST_CATALOG.find(c=>c.id===id); }
function paramsForOrder(order){
  return TEST_CATALOG.filter(c=>order.categories.includes(c.id))
    .flatMap(c=>c.sections.map(s=>({ sectionTitle:s.title, params:s.params, categoryId:c.id, categoryName:c.printGroupLabel||c.category })));
}
function paramsForOrderGrouped(order){
  return TEST_CATALOG.filter(c=>order.categories.includes(c.id))
    .map(c=>({ categoryName:c.printGroupLabel || c.category, hasUnitsColumn:!!c.hasUnitsColumn, comments:c.comments, sections:c.sections }));
}
function flagFor(param, value){
  if(value===""||value===undefined||value===null) return null;
  if(param.type==="numeric"){
    const v=parseFloat(value);
    if(isNaN(v)) return null;
    if(v<param.low) return "low";
    if(v>param.high) return "high";
    return "normal";
  }
  if(param.type==="select"){ return param.normal.includes(value) ? "normal":"abnormal"; }
  return null;
}

// ---------------- Storage (IndexedDB — much larger device-level storage than localStorage) ----------------
const DB_NAME = "lab-system-db";
const STORE_NAME = "kv";

function dbOpen(){
  return new Promise((resolve,reject)=>{
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = ()=> req.result.createObjectStore(STORE_NAME);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function dbGet(key){
  const db = await dbOpen();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readonly");
    const req = tx.objectStore(STORE_NAME).get(key);
    req.onsuccess = ()=> resolve(req.result);
    req.onerror = ()=> reject(req.error);
  });
}
async function dbSet(key, val){
  const db = await dbOpen();
  return new Promise((resolve,reject)=>{
    const tx = db.transaction(STORE_NAME,"readwrite");
    tx.objectStore(STORE_NAME).put(val, key);
    tx.oncomplete = ()=> resolve();
    tx.onerror = ()=> reject(tx.error);
  });
}

// ---------------- State ----------------
let state = {
  view: "new",
  orders: [],
  selectedOrderId: null,
  editMode: false,
  search: ""
};

async function loadOrders(){
  try{
    const fromDb = await dbGet("lab-orders");
    if(fromDb){ state.orders = fromDb; return; }
  }catch(e){ console.error("IndexedDB load failed:", e); }
  // Fallback: older data saved before this update, or IndexedDB unavailable
  try{ state.orders = JSON.parse(localStorage.getItem("lab-orders") || "[]"); }catch(e){ state.orders = []; }
}

async function persistOrders(){
  try{
    await dbSet("lab-orders", state.orders);
    hideStorageBanner("err");
  }catch(e){
    console.error("IndexedDB save failed, falling back to localStorage:", e);
    try{
      localStorage.setItem("lab-orders", JSON.stringify(state.orders));
      showStorageBanner("warn", "⚠ Behtar storage available nahi thi, data localStorage mein save hua (limited space).");
    }catch(e2){
      console.error("localStorage save also failed:", e2);
      showStorageBanner("err", "❌ Yeh record save NAHI ho saka — device ki storage bhar chuki hai. Foran purana data backup/export karein ya storage khali karein, warna yeh record kho jaye ga.");
      alert("Zaroori: Yeh record save nahi ho saka kyunke device ki storage bhar chuki hai. Kirpya storage khali karein.");
    }
  }
  checkStorageHealth();
}

function showStorageBanner(level, msg){
  const el = document.getElementById("storage-banner");
  if(el) el.innerHTML = `<div class="storage-banner ${level}">${msg}</div>`;
}
function hideStorageBanner(level){
  const el = document.getElementById("storage-banner");
  if(el && el.querySelector(`.${level}`)) el.innerHTML = "";
}

async function checkStorageHealth(){
  try{
    if(navigator.storage && navigator.storage.estimate){
      const { usage, quota } = await navigator.storage.estimate();
      if(quota){
        const pct = (usage/quota)*100;
        if(pct >= 90){
          showStorageBanner("err", `❌ Storage ${pct.toFixed(0)}% bhar chuki hai — foran data backup/export karein, warna nayi records save nahi ho paein gi.`);
        } else if(pct >= 75){
          showStorageBanner("warn", `⚠ Storage ${pct.toFixed(0)}% istemaal ho chuki hai. Jald backup lena behtar rahega.`);
        }
      }
    }
  }catch(e){ /* estimate() not supported everywhere — safe to ignore */ }
}
function nextInternalId(){
  let n = parseInt(localStorage.getItem("internal-counter") || "0", 10) + 1;
  localStorage.setItem("internal-counter", String(n));
  return "REC-" + String(n).padStart(6,"0");
}
function esc(s){ return (s===undefined||s===null) ? "" : String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

// ---------------- View switching ----------------
function switchView(v){
  state.view = v;
  render();
}

function render(){
  document.getElementById("tab-new").className = "tab-btn" + (state.view==="new" ? " active":"");
  document.getElementById("tab-queue").className = "tab-btn" + (state.view==="queue" ? " active":"");
  document.getElementById("tab-history").className = "tab-btn" + (state.view==="history" ? " active":"");
  const el = document.getElementById("tab-queue");
  const pending = state.orders.filter(o=>o.status==="pending").length;
  el.textContent = "Queue" + (pending ? ` (${pending})` : "");

  const main = document.getElementById("main");
  if(state.view==="new") main.innerHTML = renderNewOrder();
  else if(state.view==="queue") main.innerHTML = renderQueue();
  else main.innerHTML = renderHistory();
}

// ---------------- New Order ----------------
function renderNewOrder(){
  const cats = TEST_CATALOG.map(cat=>{
    const count = cat.sections.reduce((n,s)=>n+s.params.length,0);
    return `<label class="cat-item" id="cat-${cat.id}">
      <input type="checkbox" onchange="onCatToggle('${cat.id}')">
      <div><div class="name">${esc(cat.category)}</div><div class="count">${count} parameter${count!==1?"s":""}</div></div>
    </label>`;
  }).join("");

  return `
  <div class="grid-2">
    <div class="card">
      <div class="panel-title display">Patient Details</div>
      <div class="field"><label>Full Name</label><input id="f-name" placeholder="e.g. Altaf Hussain" oninput="onFormInput()"></div>
      <div class="field"><label>MR.NO</label><input id="f-mrno" placeholder="e.g. ---- (optional, same as paper slip)"></div>
      <div class="field"><label>Age</label><input id="f-age" placeholder="e.g. 34"></div>
      <div class="field"><label>Gender</label>
        <select id="f-gender"><option value="M">M</option><option value="F">F</option></select>
      </div>
      <div class="field"><label>Ward</label><input id="f-ward" placeholder="Optional"></div>
      <div class="row-2">
        <div class="field"><label>Time In</label><input id="f-timein" placeholder="02:00pm"></div>
        <div class="field"><label>Time Out</label><input id="f-timeout" placeholder="04:30pm"></div>
      </div>
      <button class="btn btn-primary" id="submit-btn" onclick="createOrder()" disabled style="width:100%; justify-content:center;">Create Order</button>
      <div class="hint" id="submit-hint">Naam aur kam az kam 1 test select karein.</div>
    </div>
    <div class="card">
      <div class="panel-title display">Select Test(s)</div>
      <div class="panel-sub" id="cat-count">0 tests selected</div>
      <div class="cat-list">${cats}</div>
    </div>
  </div>`;
}

function onCatToggle(id){
  const el = document.getElementById("cat-"+id);
  el.classList.toggle("checked");
  onFormInput();
}

function onFormInput(){
  const name = document.getElementById("f-name")?.value.trim();
  const selected = TEST_CATALOG.filter(c=>document.getElementById("cat-"+c.id)?.classList.contains("checked"));
  const countEl = document.getElementById("cat-count");
  if(countEl) countEl.textContent = selected.length + " test" + (selected.length!==1?"s":"") + " selected";
  const btn = document.getElementById("submit-btn");
  if(btn) btn.disabled = !(name && selected.length>0);
}

function createOrder(){
  const name = document.getElementById("f-name").value.trim();
  const selectedCats = TEST_CATALOG.filter(c=>document.getElementById("cat-"+c.id).classList.contains("checked")).map(c=>c.id);
  if(!name || selectedCats.length===0) return;
  const mrNoInput = document.getElementById("f-mrno").value.trim();
  const order = {
    id: nextInternalId(),
    mrNo: mrNoInput || "----",
    name: name,
    age: document.getElementById("f-age").value,
    gender: document.getElementById("f-gender").value,
    ward: document.getElementById("f-ward").value,
    timeIn: document.getElementById("f-timein").value,
    timeOut: document.getElementById("f-timeout").value,
    date: new Date().toISOString(),
    categories: selectedCats,
    status: "pending",
    results: {},
    customParams: []
  };
  state.orders.unshift(order);
  persistOrders();
  state.selectedOrderId = order.id;
  state.editMode = false;
  state.view = "queue";
  render();
}

// ---------------- Queue ----------------
function getSelectedOrder(){ return state.orders.find(o=>o.id===state.selectedOrderId); }

function renderQueue(){
  return `
  <div class="grid-2">
    <div class="card" style="padding:0; overflow:hidden;">
      <div style="padding:12px;">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input id="search-box" placeholder="Search name or MR.NO" value="${esc(state.search)}" oninput="onSearch(this.value)">
        </div>
      </div>
      <div class="order-list" id="order-list">${renderOrderListItems()}</div>
    </div>
    <div id="results-panel">${renderResultsPanel()}</div>
  </div>`;
}

function onSearch(v){
  state.search = v;
  document.getElementById("order-list").innerHTML = renderOrderListItems();
}

function renderOrderListItems(){
  const s = state.search.trim().toLowerCase();
  const list = s ? state.orders.filter(o=>o.name.toLowerCase().includes(s) || o.mrNo.toLowerCase().includes(s)) : state.orders;
  if(list.length===0) return `<div class="empty-note">Koi order nahi mila.</div>`;
  return list.map(o=>`
    <button class="order-item ${o.id===state.selectedOrderId?'sel':''}" onclick="selectOrder('${o.id}')">
      <div class="top"><span class="oname">${esc(o.name)}</span><span>›</span></div>
      <div class="omr mono">${esc(o.mrNo)}</div>
      <div style="margin-top:6px;"><span class="badge ${o.status}">${o.status==='completed'?'✓ Completed':'○ Pending'}</span></div>
    </button>`).join("");
}

function selectOrder(id){
  state.selectedOrderId = id;
  state.editMode = false;
  document.getElementById("order-list").innerHTML = renderOrderListItems();
  document.getElementById("results-panel").innerHTML = renderResultsPanel();
}

function renderResultsPanel(){
  const order = getSelectedOrder();
  if(!order) return `<div class="dashed">Order select karein queue se.</div>`;
  const sections = paramsForOrder(order);
  const allParams = sections.flatMap(s=>s.params);
  const anyEntered = allParams.some(p=> order.results[p.id]!==undefined && order.results[p.id]!=="") || (order.customParams||[]).some(cp=>cp.value && cp.value.trim());
  const abnormalCount = allParams.filter(p=>{ const f=flagFor(p, order.results[p.id]); return f && f!=="normal"; }).length;
  const locked = order.status==="completed" && !state.editMode;

  // group consecutive sections by their parent category so multi-test orders show a clear heading per test
  let sectionsHtml = "";
  let lastCategoryId = null;
  const showSectionTitleFor = {};
  order.categories.forEach(cid=>{
    const cat = catById(cid);
    if(cat) showSectionTitleFor[cid] = cat.sections.length > 1;
  });
  sections.forEach(sec=>{
    if(sec.categoryId !== lastCategoryId){
      sectionsHtml += `<div class="cat-heading">${esc(sec.categoryName)}</div>`;
      lastCategoryId = sec.categoryId;
    }
    if(showSectionTitleFor[sec.categoryId]){
      sectionsHtml += `<div class="sec-title">${esc(sec.sectionTitle)}</div>`;
    }
    sectionsHtml += sec.params.map(p=>renderParamRow(order, p, locked)).join("");
  });

  let actionsHtml;
  if(order.status==="pending"){
    actionsHtml = `<button class="btn btn-primary" ${anyEntered?'':'disabled'} onclick="markCompleted('${order.id}')">✓ Mark Completed</button>`;
  } else {
    actionsHtml = `
      <button class="btn btn-outline" onclick="printReport()">🖶 Print Report</button>
      <button class="btn btn-outline ${state.editMode?'on':''}" onclick="toggleEditMode()">✎ ${state.editMode?'Editing... (tap to lock)':'Edit Results'}</button>`;
  }

  return `
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:10px;">
      <div>
        <div class="display" style="font-weight:700; font-size:16px;">${esc(order.name)}</div>
        <div style="font-size:12.5px; color:var(--muted); margin-top:2px;">${order.age?esc(order.age)+' yrs · ':''}${esc(order.gender)}${order.ward?' · Ward: '+esc(order.ward):''}</div>
      </div>
      <div style="text-align:right;">
        <div class="mono" style="font-size:12px; background:#F0F5F4; padding:4px 10px; border-radius:6px; display:inline-block; font-weight:600;">${esc(order.mrNo)}</div>
        <div style="margin-top:6px;"><span class="badge ${order.status}">${order.status==='completed'?'✓ Completed':'○ Pending'}</span></div>
      </div>
    </div>
    <div id="warn-box-area">${abnormalCount>0?`<div class="warn-box">⚠ ${abnormalCount} result${abnormalCount!==1?'s':''} outside reference range</div>`:''}</div>
    ${sectionsHtml}
    ${renderCustomParamsSection(order, locked)}
    ${!locked ? `<button class="btn btn-outline" style="margin-top:10px;" onclick="addCustomParam('${order.id}')">+ Add Custom Test</button>` : ''}
    <div id="actions-area" style="margin-top:18px; display:flex; gap:10px; flex-wrap:wrap;">${actionsHtml}</div>
    <div id="hint-area">${(!anyEntered && order.status==='pending')?'<div class="hint">Kam az kam ek result enter karein Mark Completed karne se pehle. Jo test nahi hua wo khaali chhod sakte hain — report mein "—" print hoga.</div>':''}</div>
  </div>`;
}

function renderCustomParamsSection(order, locked){
  const list = order.customParams || [];
  if(list.length===0) return "";
  const rows = list.map(cp => `
    <div class="param-row" id="custom-row-${cp.id}">
      <div>
        <input type="text" placeholder="Test name" value="${esc(cp.name)}" ${locked?'disabled':''}
          oninput="updateCustomParam('${order.id}','${cp.id}','name', this.value)"
          style="width:100%; padding:6px 8px; border-radius:6px; border:1px solid var(--border); font-size:13px; font-weight:600; margin-bottom:4px;">
        <input type="text" placeholder="Reference range" value="${esc(cp.ref)}" ${locked?'disabled':''}
          oninput="updateCustomParam('${order.id}','${cp.id}','ref', this.value)"
          style="width:100%; padding:5px 8px; border-radius:6px; border:1px solid var(--border); font-family:'IBM Plex Mono',monospace; font-size:10.5px;">
      </div>
      <div class="param-input-wrap">
        <input type="text" placeholder="Result" value="${esc(cp.value)}" ${locked?'disabled':''}
          oninput="updateCustomParam('${order.id}','${cp.id}','value', this.value)"
          style="width:90px; padding:7px 8px; border-radius:7px; border:1px solid var(--border); font-family:'IBM Plex Mono',monospace; font-size:13px;">
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <input type="text" placeholder="Unit" value="${esc(cp.unit)}" ${locked?'disabled':''}
          oninput="updateCustomParam('${order.id}','${cp.id}','unit', this.value)"
          style="width:70px; padding:7px 8px; border-radius:7px; border:1px solid var(--border); font-size:12px;">
        ${!locked ? `<button onclick="removeCustomParam('${order.id}','${cp.id}')" style="border:none; background:none; color:var(--bad); cursor:pointer; font-size:16px; font-weight:700;" title="Remove">×</button>` : ''}
      </div>
    </div>`).join("");
  return `<div class="cat-heading">Additional / Custom Tests</div>${rows}`;
}

function addCustomParam(orderId){
  const order = state.orders.find(o=>o.id===orderId);
  if(!order) return;
  if(!order.customParams) order.customParams = [];
  order.customParams.push({ id: "c" + Date.now() + Math.floor(Math.random()*1000), name:"", value:"", ref:"", unit:"" });
  persistOrders();
  document.getElementById("results-panel").innerHTML = renderResultsPanel();
}

function updateCustomParam(orderId, cid, field, value){
  const order = state.orders.find(o=>o.id===orderId);
  if(!order || !order.customParams) return;
  const cp = order.customParams.find(c=>c.id===cid);
  if(!cp) return;
  cp[field] = value;
  persistOrders();
  if(field === "value") refreshPanelStatus(order);
}

function removeCustomParam(orderId, cid){
  const order = state.orders.find(o=>o.id===orderId);
  if(!order || !order.customParams) return;
  order.customParams = order.customParams.filter(c=>c.id!==cid);
  persistOrders();
  document.getElementById("results-panel").innerHTML = renderResultsPanel();
}

function renderParamRow(order, p, locked){
  const value = order.results[p.id] ?? "";
  const flag = flagFor(p, value);
  let inputHtml;
  if(p.type==="select"){
    const opts = ['<option value="">—</option>'].concat(p.options.map(op=>`<option value="${esc(op)}" ${value===op?'selected':''}>${esc(op)}</option>`)).join("");
    inputHtml = `<select ${locked?'disabled':''} onchange="updateResult('${order.id}','${p.id}', this.value)">${opts}</select>`;
  } else if(p.type==="numeric"){
    inputHtml = `<input type="number" id="input-${p.id}" ${locked?'disabled':''} value="${esc(value)}" placeholder="—" oninput="updateResult('${order.id}','${p.id}', this.value)" style="border-color:${flag && flag!=='normal' ? '#E9AD86':'var(--border)'}">`;
  } else {
    inputHtml = `<input type="text" ${locked?'disabled':''} value="${esc(value)}" placeholder="—" oninput="updateResult('${order.id}','${p.id}', this.value)">`;
  }
  const flagTag = (flag && flag!=="normal") ? `<span class="flag-tag" id="flag-${p.id}">${flag==='abnormal'?'ABN':flag.toUpperCase()}</span>` : `<span class="flag-tag" id="flag-${p.id}"></span>`;
  const visual = p.type==="numeric" ? renderRangeBar(p, value) : `<div class="unit-note">${esc(p.unit||"")}</div>`;
  return `
    <div class="param-row" id="row-${p.id}">
      <div>
        <div class="param-name">${esc(p.name)}</div>
        <div class="param-ref">Ref: ${esc(p.ref)}</div>
      </div>
      <div class="param-input-wrap">${inputHtml}${flagTag}</div>
      <div id="visual-${p.id}">${visual}</div>
    </div>`;
}

function renderRangeBar(param, value){
  const flag = flagFor(param, value);
  const span = param.high - param.low;
  const padded = span*0.6 || param.high*0.3 || 1;
  const min = Math.max(0, param.low - padded);
  const max = param.high + padded;
  const pct = n => Math.min(100, Math.max(0, ((n-min)/(max-min))*100));
  const lowPct = pct(param.low), highPct = pct(param.high);
  const v = parseFloat(value);
  const markerPct = (value!=="" && !isNaN(v)) ? pct(v) : null;
  return `<div class="rangebar">
    <div class="track">
      <div class="fill" style="left:${lowPct}%; width:${Math.max(highPct-lowPct,2)}%;"></div>
      ${markerPct!==null?`<div class="marker" style="left:calc(${markerPct}% - 5px); background:${flag==='normal'?'var(--good)':'var(--bad)'};"></div>`:''}
    </div>
    <div class="labels"><span>${param.low}</span><span>${param.high}</span></div>
  </div>`;
}

function updateResult(orderId, paramId, value){
  const order = state.orders.find(o=>o.id===orderId);
  if(!order) return;
  order.results[paramId] = value;
  persistOrders();

  const param = paramsForOrder(order).flatMap(s=>s.params).find(p=>p.id===paramId);
  if(param){
    const flag = flagFor(param, value);
    const flagEl = document.getElementById("flag-"+paramId);
    if(flagEl) flagEl.textContent = (flag && flag!=="normal") ? (flag==='abnormal'?'ABN':flag.toUpperCase()) : "";
    const visualEl = document.getElementById("visual-"+paramId);
    if(visualEl && param.type==="numeric") visualEl.innerHTML = renderRangeBar(param, value);
    if(param.type==="numeric"){
      const inputEl = document.getElementById("input-"+paramId);
      if(inputEl) inputEl.style.borderColor = (flag && flag!=="normal") ? "#E9AD86" : "var(--border)";
    }
  }

  refreshPanelStatus(order);
}

// Updates only the warning box, action button state, and hint text —
// never touches the result input elements themselves (keeps mobile typing intact).
function refreshPanelStatus(order){
  const sections = paramsForOrder(order);
  const allParams = sections.flatMap(s=>s.params);
  const abnormalCount = allParams.filter(p=>{ const f=flagFor(p, order.results[p.id]); return f && f!=="normal"; }).length;
  const anyEntered = allParams.some(p=> order.results[p.id]!==undefined && order.results[p.id]!=="") || (order.customParams||[]).some(cp=>cp.value && cp.value.trim());

  const warnArea = document.getElementById("warn-box-area");
  if(warnArea) warnArea.innerHTML = abnormalCount>0 ? `<div class="warn-box">⚠ ${abnormalCount} result${abnormalCount!==1?'s':''} outside reference range</div>` : "";

  if(order.status === "pending"){
    const actionsArea = document.getElementById("actions-area");
    if(actionsArea){
      const btn = actionsArea.querySelector("button.btn-primary");
      if(btn) btn.disabled = !anyEntered;
    }
    const hintArea = document.getElementById("hint-area");
    if(hintArea) hintArea.innerHTML = (!anyEntered) ? '<div class="hint">Kam az kam ek result enter karein Mark Completed karne se pehle. Jo test nahi hua wo khaali chhod sakte hain — report mein "—" print hoga.</div>' : "";
  }
}

function markCompleted(orderId){
  const order = state.orders.find(o=>o.id===orderId);
  if(!order) return;
  order.status = "completed";
  persistOrders();
  state.editMode = false;
  document.getElementById("results-panel").innerHTML = renderResultsPanel();
  document.getElementById("order-list").innerHTML = renderOrderListItems();
  render(); // refresh queue count in tab
}

function toggleEditMode(){
  state.editMode = !state.editMode;
  document.getElementById("results-panel").innerHTML = renderResultsPanel();
}

// ---------------- History ----------------
function getHistoryOrders(){
  let list = [...state.orders].sort((a,b)=> new Date(b.date)-new Date(a.date));
  const s = (state.historySearch||"").trim().toLowerCase();
  if(s) list = list.filter(o=> o.name.toLowerCase().includes(s) || o.mrNo.toLowerCase().includes(s));
  return list;
}

function reprintOrder(id){
  state.selectedOrderId = id;
  printReport();
}

function renderHistoryTableBody(){
  const orders = getHistoryOrders();
  const rows = orders.map(o=>`
    <tr>
      <td>${new Date(o.date).toLocaleDateString()}</td>
      <td class="mono">${esc(o.mrNo)}</td>
      <td>${esc(o.name)}</td>
      <td>${o.age?esc(o.age)+'/':''}${esc(o.gender)}</td>
      <td>${o.categories.map(cid=>catById(cid)?.category).join(", ")}</td>
      <td><span class="badge ${o.status}">${o.status==='completed'?'✓ Completed':'○ Pending'}</span></td>
      <td>${o.status==='completed' ? `<button class="btn btn-outline" style="padding:5px 10px; font-size:11.5px;" onclick="reprintOrder('${o.id}')">🖶 Print</button>` : ''}</td>
    </tr>`).join("");
  return { rows, count: orders.length };
}

function onHistorySearch(v){
  state.historySearch = v;

  document.getElementById("history-count").textContent = count + " record" + (count!==1?"s":"");
}

function renderHistory(){

        <div style="font-size:12px; color:var(--muted2); margin-top:2px;" id="history-count">${count} record${count!==1?'s':''}</div>
      </div>
      <button class="btn btn-outline" onclick="printHistory()">🖶 Print History</button>
    </div>

      <span class="search-icon">🔍</span>

    </div>
    <div class="table-wrap">
      <table class="hist">
        <thead><tr><th>Date</th><th>MR.NO</th><th>Name</th><th>Age/Gender</th><th>Tests</th><th>Status</th><th></th></tr></thead>
        <tbody id="history-tbody">${rows || '<tr><td colspan="7" style="text-align:center; color:var(--muted2);">Koi record nahi mila.</td></tr>'}</tbody>

// ---------------- Print ----------------
function reportHeaderHtml(){
  return `<div class="rpt-header">
    <div class="rpt-logo">${PUNJAB_EMBLEM_SVG}</div>
    <div class="rpt-title-block">
      <div class="rpt-urdu">${HOSPITAL.nameUrdu}</div>
      <div class="rpt-en">${HOSPITAL.nameEn}</div>
      <div class="rpt-addr">${HOSPITAL.address}</div>
    </div>
  </div>`;
}

function patientBlockHtml(order, dateStr){
  return `<div class="rpt-hdr">
    <div class="rpt-hdr-row r1">
      <div class="lbl">Date</div><div>${dateStr}</div>
      <div class="lbl">MR .NO</div><div>${esc(order.mrNo)}</div>
    </div>
    <div class="rpt-hdr-row r2">
      <div class="lbl">Name</div><div>${esc(order.name)}</div>
      <div class="lbl">Age</div><div class="shade">${esc(order.age)||''} YRS</div>
      <div class="lbl">Gender</div><div class="shade">${esc(order.gender)}</div>
    </div>
    <div class="rpt-hdr-row r3">
      <div class="lbl">Ward</div><div>${esc(order.ward)||''}</div>
      <div>Time In:${esc(order.timeIn)||''}</div>
      <div>Time Out:${esc(order.timeOut)||''}</div>
    </div>
  </div>`;
}

function printReport(){
  const order = getSelectedOrder();
  if(!order) return;
  const grouped = paramsForOrderGrouped(order);
  const dateStr = new Date(order.date).toLocaleDateString("en-GB", { weekday:"long", year:"numeric", month:"long", day:"numeric" });

  const slides = grouped.map((cat, idx)=>{
    let rows = "";
    rows += `<tr><td colspan="${cat.hasUnitsColumn?4:3}" class="rpt-cat-title">${esc(cat.categoryName)}</td></tr>`;
    cat.sections.forEach(sec=>{
      if(cat.sections.length > 1){
        rows += `<tr><td colspan="${cat.hasUnitsColumn?4:3}" class="rpt-sec-title">${esc(sec.title)}</td></tr>`;
      }
      sec.params.forEach(p=>{
        const val = order.results[p.id];
        const resultCell = val ? esc(val) + (!cat.hasUnitsColumn && p.unit ? ' '+esc(p.unit) : '') : '—';
        rows += `<tr>
          <td style="padding-left:16px;">${esc(p.name)}</td>
          <td style="text-align:center;">${resultCell}</td>
          ${cat.hasUnitsColumn ? `<td style="text-align:center;">${esc(p.unit)||''}</td>` : ''}
          <td style="text-align:center; white-space:pre-line;">${esc(p.ref)}</td>
        </tr>`;
      });
    });
    const headCols = cat.hasUnitsColumn
      ? `<th>Test Name</th><th>Patient Result</th><th>Units</th><th>Reference Range</th>`
      : `<th>Test Name</th><th>Patient Result</th><th>Reference Range</th>`;
    return `
      <div class="rpt-slide">
        ${reportHeaderHtml()}
        ${patientBlockHtml(order, dateStr)}
        <table class="rpt-results">
          <thead><tr>${headCols}</tr></thead>
          <tbody>${rows}</tbody>
        </table>
        ${cat.comments ? `<div class="rpt-comments">Comments: ${esc(cat.comments)}</div>` : ''}
        <div class="rpt-sig"><div>Pathologist Signature</div></div>
      </div>
      ${idx < grouped.length-1 ? '<div class="rpt-pagebreak"></div>' : ''}
    `;
  }).join("");

  const customList = (order.customParams||[]).filter(cp=>cp.name.trim() || cp.value.trim());
  let customSlide = "";
  if(customList.length){
    const rows = customList.map(cp=>`
      <tr>
        <td style="padding-left:16px;">${esc(cp.name)||'—'}</td>
        <td style="text-align:center;">${cp.value ? esc(cp.value)+(cp.unit?' '+esc(cp.unit):'') : '—'}</td>
        <td style="text-align:center; white-space:pre-line;">${esc(cp.ref)||''}</td>
      </tr>`).join("");
    customSlide = `
      <div class="rpt-pagebreak"></div>
      <div class="rpt-slide">
        ${reportHeaderHtml()}
        ${patientBlockHtml(order, dateStr)}
        <table class="rpt-results">
          <thead><tr><th>Test Name</th><th>Patient Result</th><th>Reference Range</th></tr></thead>
          <tbody><tr><td colspan="3" class="rpt-cat-title">Additional / Custom Tests</td></tr>${rows}</tbody>
        </table>
        <div class="rpt-sig"><div>Pathologist Signature</div></div>
      </div>`;
  }

  document.getElementById("print-report").innerHTML = slides + customSlide;
  downloadStandaloneReport(order, slides + customSlide);
  printWithFilename(order);
}

// Downloads a self-contained HTML file of this exact report (name_MRno.html).
// This is a plain HTML file (not a canvas-rendered PDF), so it can never come out
// corrupted — it can be opened in any browser, any time, and printed directly.
function downloadStandaloneReport(order, innerHtml){
  const safeName = (order.name || "Patient").trim().replace(/\s+/g,"_").replace(/[^\w\u0600-\u06FF_-]/g,"");
  const safeMr = (order.mrNo || "NoMR").trim().replace(/\s+/g,"_").replace(/[^\w-]/g,"") || "NoMR";
  const filename = `${safeName}_${safeMr}.html`;
  const styleTag = document.querySelector("style") ? document.querySelector("style").outerHTML : "";

  const doc = `<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${safeName} — ${safeMr}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
${styleTag}
<style>body{background:#fff; padding:20px;} .print-only{display:block !important;}</style>
</head>
<body>
${innerHtml}
</body>
</html>`;

  try{
    const blob = new Blob([doc], {type:"text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    setTimeout(()=> URL.revokeObjectURL(url), 3000);
  }catch(e){
    console.error("Standalone report download failed:", e);
  }
}

// Sets document.title to "<Name>_<MRNo>" before printing so that when the user
// chooses "Save as PDF" in the print dialog, that name is pre-filled — and the
// browser remembers the folder they picked last time, so repeat saves land in
// the same place automatically.
function printWithFilename(order){
  const safeName = (order.name || "Patient").trim().replace(/\s+/g,"_").replace(/[^\w\u0600-\u06FF_-]/g,"");
  const safeMr = (order.mrNo || "NoMR").trim().replace(/\s+/g,"_").replace(/[^\w-]/g,"") || "NoMR";
  const originalTitle = document.title;
  document.title = `${safeName}_${safeMr}`;
  const restore = ()=>{ document.title = originalTitle; window.removeEventListener("afterprint", restore); };
  window.addEventListener("afterprint", restore);
  window.print();
  setTimeout(restore, 4000); // fallback in case afterprint doesn't fire
}

function printHistory(){
  const orders = getHistoryOrders();
  const rows = orders.map(o=>`
    <tr>
      <td style="padding:4px 6px;">${new Date(o.date).toLocaleDateString()}</td>
      <td style="padding:4px 6px;">${esc(o.mrNo)}</td>
      <td style="padding:4px 6px;">${esc(o.name)}</td>
      <td style="padding:4px 6px;">${o.age?esc(o.age)+'/':''}${esc(o.gender)}</td>
      <td style="padding:4px 6px;">${o.categories.map(cid=>catById(cid)?.category).join(", ")}</td>
      <td style="padding:4px 6px;">${esc(o.status)}</td>
    </tr>`).join("");
  const html = `
    ${reportHeaderHtml()}
    <div style="font-weight:700; font-size:14px; margin-bottom:10px;">Patient History Report — All Records (${orders.length} records)</div>
    <table class="rpt" style="font-size:12px;">
      <thead><tr><th>Date</th><th>MR.NO</th><th>Name</th><th>Age/Gender</th><th>Tests</th><th>Status</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  document.getElementById("print-history").innerHTML = html;
  window.print();
}
